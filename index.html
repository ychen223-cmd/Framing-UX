<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift — Use your time with intention</title>

  <!-- Google Fonts: refined serif + quiet mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────────
       CSS VARIABLES — edit colours / spacing here
    ───────────────────────────────────────────── */
    :root {
      --bg:        #f5f4f0;
      --ink:       #111110;
      --muted:     #777772;
      --border:    #d6d5d0;
      --selected:  #111110;
      --sel-text:  #f5f4f0;
      --card-bg:   #ffffff;
      --radius:    6px;
      --gap:       1.5rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    header {
      width: 100%;
      max-width: 480px;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.55rem;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .field-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .opt-btn {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 0.8rem;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      outline: none;
    }

    .opt-btn:hover          { border-color: var(--ink); }
    .opt-btn.selected       { background: var(--selected); border-color: var(--selected); color: var(--sel-text); }
    .opt-btn:focus-visible  { outline: 2px solid var(--ink); outline-offset: 2px; }

    #get-action-btn {
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.85rem 1.5rem;
      background: var(--ink);
      color: var(--sel-text);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      width: 100%;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }

    #get-action-btn:hover    { opacity: 0.82; }
    #get-action-btn:active   { opacity: 0.65; }
    #get-action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #validation-msg {
      font-size: 0.75rem;
      color: var(--muted);
      display: none;
    }

    #result-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: none;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .result-action-label,
    .result-why-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    #result-action {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      line-height: 1.35;
    }

    #result-why {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    .feedback-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .feedback-btn {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 0.72rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .feedback-btn:hover { border-color: var(--ink); color: var(--ink); }

    #loading-indicator {
      display: none;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 1rem 0;
      text-align: center;
      letter-spacing: 0.06em;
    }

    .blink { animation: blink 1.1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    #error-msg {
      display: none;
      font-size: 0.78rem;
      color: #b00;
      padding: 0.75rem 1rem;
      border: 1px solid #e0b0b0;
      border-radius: var(--radius);
      background: #fff5f5;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 0.65rem;
      color: var(--border);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1 class="logo">Drift</h1>
    <p class="tagline">One moment. One action. No scrolling.</p>
  </header>

  <main>

    <!-- INPUT 1: Where are you? -->
    <div class="field">
      <span class="field-label">Where are you?</span>
      <div class="options" role="group" aria-label="Location">
        <button class="opt-btn" data-group="location" data-value="home">Home</button>
        <button class="opt-btn" data-group="location" data-value="office">Office</button>
        <button class="opt-btn" data-group="location" data-value="commuting">Commuting</button>
        <button class="opt-btn" data-group="location" data-value="in between places">In between places</button>
      </div>
    </div>

    <!-- INPUT 2: Energy level -->
    <div class="field">
      <span class="field-label">Energy level</span>
      <div class="options" role="group" aria-label="Energy level">
        <button class="opt-btn" data-group="energy" data-value="very low">Very low</button>
        <button class="opt-btn" data-group="energy" data-value="low">Low</button>
        <button class="opt-btn" data-group="energy" data-value="medium">Medium</button>
      </div>
    </div>

    <!-- INPUT 3: Time available -->
    <div class="field">
      <span class="field-label">Time available</span>
      <div class="options" role="group" aria-label="Time available">
        <button class="opt-btn" data-group="time" data-value="under 5 minutes">Under 5 min</button>
        <button class="opt-btn" data-group="time" data-value="5–15 minutes">5–15 min</button>
        <button class="opt-btn" data-group="time" data-value="15–30 minutes">15–30 min</button>
        <button class="opt-btn" data-group="time" data-value="30+ minutes">30+ min</button>
      </div>
    </div>

    <p id="validation-msg">↑ Please select one option in each section above.</p>

    <button id="get-action-btn">Get my action</button>

    <div id="loading-indicator">Thinking<span class="blink">...</span></div>

    <div id="error-msg"></div>

    <div id="result-card" role="region" aria-live="polite" aria-label="Your action">
      <div>
        <p class="result-action-label">Action</p>
        <p id="result-action">—</p>
      </div>
      <hr class="card-divider" />
      <div>
        <p class="result-why-label">Why this fits</p>
        <p id="result-why">—</p>
      </div>
      <hr class="card-divider" />
      <div class="feedback-row">
        <button class="feedback-btn" id="btn-worked">✓ This worked</button>
        <button class="feedback-btn" id="btn-not-right">✗ Not right for this moment</button>
      </div>
    </div>

  </main>

  <footer>Drift — UX Prototype · Powered by Gemini</footer>

  <script>
    /* ═══════════════════════════════════════════════
       NOTE: There is NO API key in this file.
       The key lives in Netlify's environment variables.
       The browser talks to our own function at:
         /.netlify/functions/generate
       That function (on the server) calls Gemini.
    ═══════════════════════════════════════════════ */

    // ── STATE ────────────────────────────────────────
    // Tracks what the user has selected in each group
    const selections = {
      location: null,
      energy:   null,
      time:     null,
    };

    // ── SELECTION LOGIC ──────────────────────────────
    // When a user clicks an option button:
    //   1. Save the value in `selections`
    //   2. Toggle the .selected class visually
    document.querySelectorAll('.opt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        const value = btn.dataset.value;

        selections[group] = value;

        // Remove .selected from all buttons in this group
        document.querySelectorAll(`.opt-btn[data-group="${group}"]`).forEach(b => {
          b.classList.remove('selected');
        });

        // Mark just the clicked one
        btn.classList.add('selected');

        // Hide any leftover validation message
        document.getElementById('validation-msg').style.display = 'none';
      });
    });

    // ── SHOW / HIDE HELPERS ──────────────────────────
    function showLoading(isLoading) {
      document.getElementById('loading-indicator').style.display = isLoading ? 'block' : 'none';
      document.getElementById('get-action-btn').disabled = isLoading;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function showResultCard(action, why) {
      document.getElementById('result-action').textContent = action;
      document.getElementById('result-why').textContent    = why;
      const card = document.getElementById('result-card');
      card.style.display = 'flex';
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── CALL OUR NETLIFY FUNCTION ────────────────────
    // Instead of calling Gemini directly (which would expose the key),
    // we call our own backend function. It's just a regular POST to a URL.
    //
    // The function lives at: /.netlify/functions/generate
    // We send: { location, energy, time }
    // We receive: { action, why }
    async function getActionFromServer(location, energy, time) {
      const response = await fetch("/.netlify/functions/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        // Send the 3 user inputs as JSON in the request body
        body: JSON.stringify({ location, energy, time }),
      });

      // If the server returned an error status, throw an error
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData?.error || `Server error ${response.status}`);
      }

      // Parse the JSON response: { action, why }
      const data = await response.json();
      return data; // { action: "...", why: "..." }
    }

    // ── MAIN CLICK HANDLER ───────────────────────────
    document.getElementById('get-action-btn').addEventListener('click', async () => {

      // 1. Check that all three inputs are filled
      if (!selections.location || !selections.energy || !selections.time) {
        document.getElementById('validation-msg').style.display = 'block';
        return;
      }

      // 2. Reset the UI
      showError('');
      document.getElementById('result-card').style.display = 'none';

      // Re-trigger fade animation on next show by cloning the element
      // (a small trick: reset the animation by forcing a reflow)
      const card = document.getElementById('result-card');
      card.style.animation = 'none';
      card.offsetHeight; // triggers reflow
      card.style.animation = '';

      showLoading(true);

      try {
        // 3. Call the Netlify function (which calls Gemini server-side)
        const { action, why } = await getActionFromServer(
          selections.location,
          selections.energy,
          selections.time
        );

        // 4. Show the result
        showResultCard(action, why);

      } catch (err) {
        showError(`Something went wrong: ${err.message}`);
        console.error('Error:', err);
      } finally {
        showLoading(false);
      }
    });

    // ── FEEDBACK BUTTONS ─────────────────────────────
    document.getElementById('btn-worked').addEventListener('click', function () {
      console.log('Feedback: worked', selections);
      this.textContent = '✓ Noted!';
      this.disabled = true;
    });

    document.getElementById('btn-not-right').addEventListener('click', function () {
      console.log('Feedback: not right', selections);
      this.textContent = '✗ Noted';
      this.disabled = true;
    });

  </script>
</body>
</html>
